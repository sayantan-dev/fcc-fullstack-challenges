<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cardstyle.css">
    <title>La Regia Carte</title>

</head>
<body>
    <main id="playing-cards">
        <div class="card one">
           <div class="card-label top-left">
            <div>A</div>
            <div>♠</div>
        </div>
        <div class="center-art ace">♠</div>
        <div class="card-label bottom-right">
            <div>A</div>
            <div>♠</div>
        </div>
        </div>
        <div class="card two">
            <div class="card-label top-left">
            <div>2</div>
            <div>♣</div>
        </div>
        <div class="center-art two">
            <div>♣</div>
            <div class="inverted">♣</div>
        </div>
        <div class="card-label bottom-right">
            <div>2</div>
            <div>♣</div>
        </div>
        </div>
        <div class="card three">
             <div class="card-label top-left">
            <div>3</div>
            <div>♥</div>
        </div>
        <div class="center-art three">
            <div>♥</div>
            <div>♥</div>
            <div class="inverted">♥</div>
        </div>
        <div class="card-label bottom-right">
            <div>3</div>
            <div>♥</div>
        </div>
        </div>
<div class="card four">
    <div class="card-label top-left">
        <div>4</div>
        <div>♣</div>
    </div>
    
    
    <div class="center-art four-suits">
        <div class="suit-pair">
            <div>♣</div>
            <div>♣</div>
        </div>
        <div class="suit-pair inverted">
            <div>♣</div>
            <div>♣</div>
        </div>
    </div>
    
    <div class="card-label bottom-right">
        <div>4</div>
        <div>♣</div>
    </div>
</div>


<div class="card five">
    <div class="card-label top-left">
        <div>5</div>
        <div>♦</div>
    </div>
    
    
    <div class="center-art five-suits">
        <div class="suit-pair">
            <div>♦</div>
            <div>♦</div>
        </div>
        <div class="center-item">♦</div>
        <div class="suit-pair inverted">
            <div>♦</div>
            <div>♦</div>
        </div>
    </div>
    
    <div class="card-label bottom-right">
        <div>5</div>
        <div>♦</div>
    </div>
</div>


    </main>
</body>
</html>
